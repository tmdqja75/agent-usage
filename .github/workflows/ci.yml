name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out collector repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.3.2

      - name: Sync locked development environment
        run: uv sync --dev --locked

      - name: Configure Git identity for publish fixtures
        run: |
          git config --global user.name "tomax CI"
          git config --global user.email "tomax-ci@users.noreply.github.com"

      - name: Run tests
        run: uv run pytest -q

      - name: Run linter
        run: uv run ruff check .

      - name: Build distribution
        run: uv build

      - name: Verify CLI entry point
        run: uv run tomax --help
